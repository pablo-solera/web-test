name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/web-test

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get project version from package.json
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            # master -> latest
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            # master -> vX.Y.Z (ej. v1.0.0)
            type=raw,value=v${{ env.VERSION }},enable=${{ github.ref == 'refs/heads/master' }}
            # develop -> latest-dev
            type=raw,value=latest-dev,enable=${{ github.ref == 'refs/heads/develop' }}
            # develop -> vX.Y.Z-dev (ej. v1.0.0-dev)
            type=raw,value=v${{ env.VERSION }}-dev,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max